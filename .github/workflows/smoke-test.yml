name: smoke-test

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly: catch the server drifting from the live API even with no commits
    - cron: "0 12 * * 1"

jobs:
  smoke:
    # Exercises /v1/demo/estimate through the real MCP tool-call path — no secrets needed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run smoke
